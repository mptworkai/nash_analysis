<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sign in — Nash Events</title>
<style>
  body { font: 14px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
         margin: 0; color: #222; background: #1f2937;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: #fff; padding: 28px 32px; border-radius: 8px;
          width: 320px; box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
  h1 { margin: 0 0 4px; font-size: 18px; }
  p.sub { margin: 0 0 18px; color: #6b7280; font-size: 13px; }
  label { display: block; margin: 10px 0 4px; font-size: 12px; color: #374151;
          text-transform: uppercase; letter-spacing: 0.04em; font-weight: 600; }
  input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db;
          border-radius: 4px; font: inherit; box-sizing: border-box; }
  input:focus { outline: 0; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }
  button { width: 100%; margin-top: 16px; padding: 9px; background: #2563eb;
           color: #fff; border: 0; border-radius: 4px; font: inherit;
           font-weight: 600; cursor: pointer; }
  button:hover { background: #1d4ed8; }
  .err { background: #fef2f2; color: #991b1b; padding: 8px 10px;
         border-radius: 4px; font-size: 13px; margin: 0 0 12px;
         border: 1px solid #fecaca; }
</style>
</head>
<body>
<form method="post" class="card">
  <h1>Nash Events</h1>
  <p class="sub">Sign in to review and edit show data.</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <label for="username">Username</label>
  <input id="username" name="username" autocomplete="username" autofocus required>
  <label for="password">Password</label>
  <input id="password" name="password" type="password" autocomplete="current-password" required>
  <button type="submit">Sign in</button>
</form>
</body>
</html>
